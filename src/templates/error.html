<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오류 - Tech Digest Bot</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            color: #333;
            line-height: 1.6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 500px;
            padding: 40px 20px;
            text-align: center;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 48px 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .icon {
            font-size: 64px;
            margin-bottom: 24px;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 16px;
            color: #721c24;
        }

        p {
            color: #666;
            margin-bottom: 32px;
        }

        .btn {
            display: inline-block;
            padding: 12px 24px;
            background: #0066cc;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
            transition: background 0.2s;
        }

        .btn:hover {
            background: #0052a3;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="icon">❌</div>
            <h1>오류</h1>
            <p>{{ message }}</p>
            <a href="/" class="btn">홈으로 돌아가기</a>
        </div>
    </div>
</body>
</html>
